<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Quản lý ảnh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f0f18;
      --surface: #1a1a2e;
      --border:  rgba(255,255,255,0.08);
      --text:    #e8e8f0;
      --muted:   rgba(232,232,240,0.45);
      --red:     #ef4444;
      --red-dim: rgba(239,68,68,0.15);
      --gold:    #f59e0b;
      --gold-dim:rgba(245,158,11,0.15);
      --check:   #818cf8;
      --radius:  12px;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .header-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #totalCount {
      background: var(--gold-dim);
      color: var(--gold);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 100px;
      border: 1px solid rgba(245,158,11,0.3);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
      flex-wrap: wrap;
    }

    /* Buttons */
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.83rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-ghost:not(:disabled):hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

    .btn-danger {
      background: var(--red-dim);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--red);
    }
    .btn-danger:not(:disabled):hover { background: rgba(239,68,68,0.25); }

    .btn-danger-solid {
      background: var(--red);
      color: #fff;
    }
    .btn-danger-solid:not(:disabled):hover { background: #dc2626; }

    .selected-info {
      font-size: 0.8rem;
      color: var(--check);
      font-weight: 500;
      padding: 0 4px;
    }

    /* ── Grid ── */
    #grid {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
      align-content: start;
    }

    /* Photo card */
    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      position: relative;
      user-select: none;
    }
    .card:hover { border-color: rgba(255,255,255,0.18); transform: translateY(-2px); }
    .card.selected { border-color: var(--check); box-shadow: 0 0 0 2px rgba(129,140,248,0.35); }

    /* Checkbox */
    .card-check {
      position: absolute;
      top: 8px; left: 8px;
      width: 22px; height: 22px;
      border-radius: 6px;
      border: 2px solid rgba(255,255,255,0.5);
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 2;
      transition: background 0.15s, border-color 0.15s;
    }
    .card.selected .card-check {
      background: var(--check);
      border-color: var(--check);
    }
    .card-check svg { display: none; }
    .card.selected .card-check svg { display: block; }

    /* Delete single button */
    .card-del {
      position: absolute;
      top: 8px; right: 8px;
      width: 28px; height: 28px;
      border-radius: 6px;
      background: rgba(239,68,68,0.75);
      backdrop-filter: blur(4px);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s;
      z-index: 2;
    }
    .card-del svg { width: 14px; height: 14px; color: #fff; }
    .card:hover .card-del { opacity: 1; }
    .card-del:hover { background: var(--red); }

    /* Photo */
    .card-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      background: rgba(255,255,255,0.04);
    }

    /* Card info */
    .card-info {
      padding: 8px 10px 10px;
      border-top: 1px solid var(--border);
    }
    .card-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .card-comment {
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-style: italic;
    }
    .card-time {
      font-size: 0.68rem;
      color: rgba(232,232,240,0.3);
      margin-top: 3px;
    }

    /* Empty state */
    #emptyState {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 12px;
      color: var(--muted);
    }
    .empty-icon { font-size: 48px; opacity: 0.5; }
    .empty-text { font-size: 0.9rem; }

    /* Loading */
    #loadingState {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px;
      gap: 12px;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .spin {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Confirm dialog ── */
    #overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
    }
    #overlay.show { display: flex; }

    #dialog {
      background: #1e1e30;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 28px 28px 22px;
      max-width: 380px;
      width: calc(100% - 40px);
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    }
    .dialog-icon { font-size: 36px; margin-bottom: 12px; }
    .dialog-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }
    .dialog-body {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 22px;
    }
    .dialog-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .dialog-actions .btn { padding: 9px 20px; font-size: 0.85rem; }

    /* ── Pin gate ── */
    #pinGate {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #pinGate.unlocked { display: none; }
    .pin-box {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 36px 32px;
      max-width: 320px;
      width: calc(100% - 40px);
      text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }
    .pin-icon  { font-size: 44px; margin-bottom: 14px; }
    .pin-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 5px; }
    .pin-sub   { font-size: 0.82rem; color: var(--muted); margin-bottom: 22px; line-height: 1.5; }
    .pin-dots  {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 20px;
    }
    .pin-dot {
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      background: transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .pin-dot.filled { background: var(--gold); border-color: var(--gold); }
    .pin-dot.error  { background: var(--red);  border-color: var(--red);  }
    .pin-keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .pin-key {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
      padding: 14px 0;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }
    .pin-key:hover  { background: rgba(255,255,255,0.12); }
    .pin-key:active { transform: scale(0.93); }
    .pin-key.del    { font-size: 1rem; color: var(--muted); }
    .pin-key.empty  { visibility: hidden; cursor: default; }
    .pin-error {
      font-size: 0.78rem;
      color: var(--red);
      min-height: 18px;
      margin-top: 12px;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60%  { transform: translateX(-7px); }
      40%,80%  { transform: translateX(7px); }
    }
    .pin-box.shaking { animation: shake 0.35s; }

    /* Select-all row */
    .select-all-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .select-all-box {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-radius: 4px;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .select-all-box.checked {
      background: var(--check);
      border-color: var(--check);
    }
    .select-all-box svg { display: none; }
    .select-all-box.checked svg { display: block; }
    .select-all-label { font-size: 0.83rem; color: var(--muted); }
  </style>
</head>
<body>

<!-- Pin gate -->

<!-- Pin gate logic (plain script, runs immediately) -->
<script>
(function () {
  const CORRECT = '0404';
  let entered = '';

  const gate   = document.getElementById('pinGate');
  const box    = document.getElementById('pinBox');
  const errEl  = document.getElementById('pinError');
  const dots   = [0,1,2,3].map(i => document.getElementById('d' + i));

  function updateDots(isError) {
    dots.forEach((d, i) => {
      d.className = 'pin-dot' +
        (i < entered.length ? (isError ? ' error' : ' filled') : '');
    });
  }

  function press(k) {
    errEl.textContent = '';
    if (k === 'del') {
      entered = entered.slice(0, -1);
      updateDots();
      return;
    }
    if (entered.length >= 4) return;
    entered += k;
    updateDots();

    if (entered.length === 4) {
      if (entered === CORRECT) {
        gate.classList.add('unlocked');
      } else {
        updateDots(true);
        box.classList.add('shaking');
        errEl.textContent = 'Mã PIN không đúng';
        setTimeout(() => {
          entered = '';
          updateDots();
          box.classList.remove('shaking');
          errEl.textContent = '';
        }, 900);
      }
    }
  }

  document.querySelectorAll('.pin-key[data-k]').forEach(btn => {
    btn.addEventListener('click', () => press(btn.dataset.k));
  });

  // Also support physical keyboard
  document.addEventListener('keydown', e => {
    if (gate.classList.contains('unlocked')) return;
    if (e.key >= '0' && e.key <= '9') press(e.key);
    else if (e.key === 'Backspace') press('del');
  });
})();
</script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
import { getFirestore, collection, query, orderBy, onSnapshot,
         deleteDoc, doc, writeBatch }
  from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:            "AIzaSyCk8mVmsq8HuGRDF6jJZMTCNPHb6VziS1c",
  authDomain:        "duylinh-birthday.firebaseapp.com",
  projectId:         "duylinh-birthday",
  storageBucket:     "duylinh-birthday.firebasestorage.app",
  messagingSenderId: "574748198046",
  appId:             "1:574748198046:web:7934050b4707848f4f678f",
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── State ──
let allPhotos   = [];
let selectedIds = new Set();

// ── Elements ──
const $ = id => document.getElementById(id);
const elGrid      = $('grid');
const elTotal     = $('totalCount');
const elSelInfo   = $('selectedInfo');
const elDelSel    = $('deleteSelBtn');
const elDelAll    = $('deleteAllBtn');
const elSelAllBox = $('selectAllBox');
const elLoading   = $('loadingState');

// ── Firestore listener ──
const q = query(collection(db, 'photos'), orderBy('timestamp', 'desc'));

onSnapshot(q, snap => {
  allPhotos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  // Clean up selected IDs that no longer exist
  const existingIds = new Set(allPhotos.map(p => p.id));
  selectedIds = new Set([...selectedIds].filter(id => existingIds.has(id)));
  renderGrid();
});

// ── Render grid ──
function renderGrid() {
  elLoading.remove?.();
  elLoading.style?.display !== undefined && (elLoading.style.display = 'none');
  elGrid.innerHTML = '';

  elTotal.textContent = `${allPhotos.length} ảnh`;
  updateSelectionUI();

  if (!allPhotos.length) {
    elGrid.innerHTML = `
      <div id="emptyState">
        <div class="empty-icon">📭</div>
        <div class="empty-text">Chưa có ảnh nào được chia sẻ</div>
      </div>`;
    return;
  }

  allPhotos.forEach(photo => {
    const card = document.createElement('div');
    card.className = 'card' + (selectedIds.has(photo.id) ? ' selected' : '');
    card.dataset.id = photo.id;

    const time = photo.timestamp?.toDate
      ? photo.timestamp.toDate().toLocaleTimeString('vi-VN', { hour:'2-digit', minute:'2-digit' })
      : '';

    card.innerHTML = `
      <div class="card-check">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="2,6 5,9 10,3"/>
        </svg>
      </div>
      <button class="card-del" data-del="${photo.id}" title="Xoá ảnh này">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
      <img class="card-img" src="${photo.imageUrl}" loading="lazy" alt="">
      <div class="card-info">
        <div class="card-name">${esc(photo.name || 'Ẩn danh')}</div>
        ${photo.comment ? `<div class="card-comment">"${esc(photo.comment)}"</div>` : ''}
        <div class="card-time">${time}</div>
      </div>`;

    // Toggle selection
    card.addEventListener('click', e => {
      if (e.target.closest('.card-del')) return;
      toggleSelect(photo.id);
    });

    // Delete single
    card.querySelector('.card-del').addEventListener('click', e => {
      e.stopPropagation();
      confirmDelete(
        `Xoá ảnh của ${photo.name || 'Ẩn danh'}?`,
        `Ảnh này sẽ bị xoá vĩnh viễn khỏi màn hình chiếu.`,
        () => deleteSingle(photo.id)
      );
    });

    elGrid.appendChild(card);
  });
}

// ── Selection ──
function toggleSelect(id) {
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  updateSelectionUI();
  // Update card style without full re-render
  document.querySelectorAll(`.card[data-id="${id}"]`).forEach(c => {
    c.classList.toggle('selected', selectedIds.has(id));
  });
}

$('selectAllWrap').addEventListener('click', () => {
  if (selectedIds.size === allPhotos.length && allPhotos.length > 0) {
    selectedIds.clear();
  } else {
    allPhotos.forEach(p => selectedIds.add(p.id));
  }
  renderGrid();
});

function updateSelectionUI() {
  const n = selectedIds.size;
  const all = allPhotos.length;

  elDelSel.disabled = n === 0;
  elDelSel.textContent = n > 0 ? `Xoá đã chọn (${n})` : 'Xoá đã chọn';
  // Fix: re-add icon
  elDelSel.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg> Xoá đã chọn${n > 0 ? ` (${n})` : ''}`;
  elDelSel.disabled = n === 0;

  if (n > 0) {
    elSelInfo.style.display = '';
    elSelInfo.textContent = `${n}/${all} đã chọn`;
  } else {
    elSelInfo.style.display = 'none';
  }

  const isAll = all > 0 && n === all;
  elSelAllBox.classList.toggle('checked', isAll);
}

// ── Delete ──
async function deleteSingle(id) {
  try {
    await deleteDoc(doc(db, 'photos', id));
    selectedIds.delete(id);
  } catch (e) {
    alert('Lỗi xoá: ' + e.message);
  }
}

elDelSel.addEventListener('click', () => {
  const ids = [...selectedIds];
  confirmDelete(
    `Xoá ${ids.length} ảnh đã chọn?`,
    `${ids.length} ảnh này sẽ bị xoá vĩnh viễn.`,
    async () => {
      try {
        const batch = writeBatch(db);
        ids.forEach(id => batch.delete(doc(db, 'photos', id)));
        await batch.commit();
        selectedIds.clear();
      } catch (e) { alert('Lỗi xoá: ' + e.message); }
    }
  );
});

elDelAll.addEventListener('click', () => {
  if (!allPhotos.length) return;
  confirmDelete(
    `Xoá tất cả ${allPhotos.length} ảnh?`,
    `Toàn bộ ảnh đã chia sẻ sẽ bị xoá vĩnh viễn. Không thể khôi phục.`,
    async () => {
      try {
        // Batch delete in chunks of 500
        const ids = allPhotos.map(p => p.id);
        for (let i = 0; i < ids.length; i += 499) {
          const batch = writeBatch(db);
          ids.slice(i, i + 499).forEach(id => batch.delete(doc(db, 'photos', id)));
          await batch.commit();
        }
        selectedIds.clear();
      } catch (e) { alert('Lỗi xoá: ' + e.message); }
    }
  );
});

// ── Confirm dialog ──
let pendingAction = null;

function confirmDelete(title, body, onConfirm) {
  $('dialogTitle').textContent   = title;
  $('dialogBody').textContent    = body;
  pendingAction = onConfirm;
  $('overlay').classList.add('show');
}

$('dialogCancel').addEventListener('click',  () => { $('overlay').classList.remove('show'); pendingAction = null; });
$('dialogConfirm').addEventListener('click', async () => {
  $('overlay').classList.remove('show');
  if (pendingAction) { await pendingAction(); pendingAction = null; }
});
$('overlay').addEventListener('click', e => {
  if (e.target === $('overlay')) { $('overlay').classList.remove('show'); pendingAction = null; }
});

function esc(s) {
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
