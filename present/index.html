<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🎂 Sinh nhật sư phụ Duy Linh 3⁴</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      color: #f0e8d8;
      /* Toàn màn hình dùng đúng tông teal của tranh sư phụ */
      background: #1e7290;
    }

    /* ── Atmospheric glows — echo the painting's palette ── */
    .atmos {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(120px);
    }
    /* Crimson echo from the painting's red cloud */
    .atmos-red {
      width: 560px; height: 700px;
      background: rgba(140, 28, 28, 0.22);
      top: -100px; left: 12%;
      animation: atPulse 8s ease-in-out infinite;
    }
    /* Warm amber in stage area */
    .atmos-amber {
      width: 500px; height: 400px;
      background: rgba(200, 140, 40, 0.09);
      bottom: -80px; right: 8%;
      animation: atPulse 10s ease-in-out infinite 3s;
    }
    @keyframes atPulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.7; transform: scale(1.06); }
    }

    /* ── App shell ── */
    #app {
      height: 100vh;
      display: flex;
      position: relative;
      z-index: 1;
    }

    /* ══════════════════════════════
       PAINTING SECTION (left 40%)
    ══════════════════════════════ */
    #masterWrap {
      width: 40%;
      flex-shrink: 0;
      height: 100%;
      position: relative;
      overflow: hidden;
      /* transparent — body gradient shows through, painting teal blends naturally */
      background: transparent;
    }

    #masterImg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;       /* Show full painting without cropping */
      object-position: center;
      display: block;
      /*
        Painting now on RIGHT → fade LEFT edge so it dissolves into the stage.
      */
      -webkit-mask-image: linear-gradient(
        to left,
        black 0%,
        black 58%,
        rgba(0,0,0,0.55) 76%,
        transparent 100%
      );
      mask-image: linear-gradient(
        to left,
        black 0%,
        black 58%,
        rgba(0,0,0,0.55) 76%,
        transparent 100%
      );
    }

    /* No vignette — show painting fully, background is same teal so it blends naturally */

    /* ══════════════════════════════
       STAGE (right 60%)
    ══════════════════════════════ */
    #stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 28px 30px 20px 38px;
      position: relative;
    }

    /* No hard overlay — body gradient handles all darkening seamlessly */
    /* All direct children float above any stacking layers */
    #stage > * { position: relative; z-index: 1; }

    /* ── Title bar ── */
    #titleBar {
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .event-name { line-height: 1.2; }
    .event-sup {
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: rgba(255, 248, 220, 0.82);
      letter-spacing: 3px;
      text-transform: uppercase;
      display: block;
      margin-bottom: 8px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.35);
    }
    .event-title {
      font-family: 'Dancing Script', cursive;
      font-size: 2.7rem;
      font-weight: 700;
      color: #ffd700;
      display: block;
      line-height: 1.1;
      text-shadow:
        0 0 32px rgba(255, 215, 0, 0.4),
        0 2px 10px rgba(0, 0, 0, 0.5);
    }
    .event-title sup { font-size: 0.62em; }

    .live-pill {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 100px;
      padding: 7px 16px;
      backdrop-filter: blur(16px);
      margin-top: 8px;
    }
    .live-dot {
      width: 7px; height: 7px;
      background: #4ade80;
      border-radius: 50%;
      box-shadow: 0 0 8px #4ade80;
      animation: blink 1.6s ease-in-out infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }
    .live-text {
      font-size: 0.72rem;
      color: rgba(255, 248, 220, 0.85);
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    /* Ornament divider — dark on golden left, fades for dark right */
    .ornament {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      opacity: 0.6;
    }
    .ornament::before, .ornament::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,0.6), transparent);
    }
    .ornament span { color: #ffd700; font-size: 9px; letter-spacing: 4px; }

    /* ── Photo area ── */
    #photoArea {
      flex: 1;
      min-height: 0;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Warm amber glow behind the photo — subtle, like a spotlight */
    #photoArea::before {
      content: '';
      position: absolute;
      inset: -60px;
      background: radial-gradient(ellipse at center, rgba(180, 110, 30, 0.07) 0%, transparent 65%);
      pointer-events: none;
    }

    /* ─ Empty state ─ */
    #empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 14px;
      transition: opacity 0.5s;
    }
    #empty.hidden { opacity: 0; pointer-events: none; position: absolute; }

    .empty-icon { font-size: 46px; animation: float 3.5s ease-in-out infinite; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .empty-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      color: rgba(240, 232, 216, 0.9);
      text-shadow: 0 2px 14px rgba(0,0,0,0.5);
    }
    .empty-sub {
      font-size: 0.86rem;
      color: rgba(240, 232, 216, 0.5);
      line-height: 1.7;
    }
    .empty-qr-box {
      background: rgba(255, 255, 255, 0.92);
      border-radius: 16px;
      padding: 13px;
      box-shadow: 0 10px 44px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,215,0,0.3);
    }
    .empty-url {
      font-size: 0.74rem;
      color: rgba(240, 232, 216, 0.5);
      letter-spacing: 0.4px;
    }

    /* ─ Photo display ─ */
    #photoDisplay {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      height: 100%;
      gap: 10px;
    }
    #photoDisplay.visible { display: flex; }

    #photoFrame {
      flex: 1;
      min-height: 0;
      width: 100%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #mainPhoto {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      display: block;
      border-radius: 14px;
      /* No hard border — soft shadow only, feels like the photo glows from within */
      box-shadow:
        0 0 0 1px rgba(255, 215, 0, 0.14),
        0 28px 80px rgba(0, 0, 0, 0.65),
        0 0 70px rgba(180, 110, 30, 0.1);
      transition: opacity 0.5s ease;
      object-fit: contain;
    }
    #mainPhoto.fade { opacity: 0; }

    /* Name / comment overlay */
    #mainInfo {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 52px 26px 18px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      border-radius: 0 0 14px 14px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.5s 0.3s, transform 0.5s 0.3s;
      pointer-events: none;
    }
    #mainInfo.show { opacity: 1; transform: translateY(0); }
    #infoName {
      font-family: 'Dancing Script', cursive;
      font-size: 2.1rem;
      color: #fff;
      text-shadow: 0 2px 12px rgba(0,0,0,0.8);
      margin-bottom: 3px;
    }
    #infoComment {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.82);
      font-style: italic;
      font-weight: 300;
      text-shadow: 0 1px 6px rgba(0,0,0,0.8);
    }

    #slideCounter {
      position: absolute;
      top: 10px; right: 12px;
      font-size: 0.65rem;
      color: rgba(255,255,255,0.38);
      background: rgba(0,0,0,0.3);
      border-radius: 100px;
      padding: 3px 9px;
      backdrop-filter: blur(8px);
    }

    /* ── Progress bar ── */
    #progressWrap {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 100px;
      overflow: hidden;
      flex-shrink: 0;
    }
    #progressBar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #c8952a, #ffd700, #c8952a);
      background-size: 200% 100%;
      border-radius: 100px;
      animation: shimmer 2.4s linear infinite;
    }
    @keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }

    /* ── Bottom bar: QR + thumbnail strip ── */
    #bottomBar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 14px;
      padding-top: 14px;
      margin-top: 6px;
      border-top: 1px solid rgba(255, 215, 0, 0.12);
    }

    /* QR — positioned top-right of painting section */
    #qrOnPainting {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 5;   /* above ::after vignette */
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    #qrBar {
      background: rgba(255,255,255,0.93);
      border-radius: 9px;
      padding: 5px;
      box-shadow: 0 4px 22px rgba(0,0,0,0.45);
    }
    .qr-hint {
      font-size: 0.59rem;
      color: rgba(240, 232, 216, 0.55);
      text-align: center;
      letter-spacing: 0.3px;
      white-space: nowrap;
      text-shadow: 0 1px 4px rgba(0,0,0,0.7);
    }

    /* Horizontal thumbnail strip */
    #thumbsStrip {
      flex: 1;
      display: flex;
      gap: 7px;
      overflow-x: auto;
      align-items: center;
      scrollbar-width: none;
      padding: 3px 0;
    }
    #thumbsStrip::-webkit-scrollbar { display: none; }

    .thumb {
      flex-shrink: 0;
      width: 58px; height: 58px;
      border-radius: 8px;
      overflow: hidden;
      border: 1.5px solid rgba(255, 215, 0, 0.22);
      cursor: pointer;
      transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
    }
    .thumb.thumb-new { animation: thumbPop 0.3s ease; }
    @keyframes thumbPop { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .thumb:hover { transform: scale(1.12); border-color: rgba(255,215,0,0.75); }
    .thumb.active-thumb { border-color: #ffd700; box-shadow: 0 0 12px rgba(255,215,0,0.55); }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* ── Fullscreen button ── */
    #fsBtn {
      position: fixed;
      bottom: 18px;
      right: 18px;
      z-index: 200;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s, background 0.2s;
      opacity: 0.45;
    }
    #fsBtn:hover { opacity: 1; background: rgba(0,0,0,0.55); }
    #fsBtn svg { width: 20px; height: 20px; }
    /* Hide in fullscreen */
    :fullscreen #fsBtn, :-webkit-full-screen #fsBtn { display: none; }

    /* ── Confetti canvas ── */
    #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
  </style>
</head>
<body>

<canvas id="confetti"></canvas>
<div class="atmos atmos-red"></div>
<div class="atmos atmos-amber"></div>

<!-- Fullscreen button -->
<button id="fsBtn" title="Toàn màn hình (F11)">
  <svg id="fsIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
      d="M4 8V5a1 1 0 011-1h3M4 16v3a1 1 0 001 1h3M16 4h3a1 1 0 011 1v3M20 16v3a1 1 0 01-1 1h-3"/>
  </svg>
</button>

<div id="app">

  <!-- ══ STAGE (LEFT) ══ -->
  <div id="stage">

    <!-- Title bar -->
    <div id="titleBar">
      <div class="event-name">
        <span class="event-sup">✦ &nbsp; Đêm tiệc sinh nhật &nbsp; ✦</span>
        <span class="event-title">Sư phụ Duy Linh 3<sup>4</sup></span>
      </div>
      <div class="live-pill">
        <div class="live-dot"></div>
        <span class="live-text">LIVE &nbsp;·&nbsp; <span id="photoCount">0 ảnh</span></span>
      </div>
    </div>

    <!-- Ornament divider -->
    <div class="ornament"><span>✦ ✦ ✦</span></div>

    <!-- Photo area -->
    <div id="photoArea">

      <!-- Empty state -->
      <div id="empty">
        <div class="empty-icon">✨</div>
        <h2 class="empty-title">Đêm tiệc sắp bắt đầu!</h2>
        <p class="empty-sub">Khách mời quét mã QR để chia sẻ<br>khoảnh khắc lên màn hình</p>
        <div class="empty-qr-box" id="qrEmpty"></div>
        <div class="empty-url" id="emptyUrl"></div>
      </div>

      <!-- Photo display -->
      <div id="photoDisplay">
        <div id="photoFrame">
          <img id="mainPhoto" src="" alt="">
          <div id="mainInfo">
            <div id="infoName"></div>
            <div id="infoComment"></div>
          </div>
          <div id="slideCounter"></div>
        </div>
        <div id="progressWrap"><div id="progressBar"></div></div>
      </div>

    </div><!-- /photoArea -->

    <!-- Bottom bar: thumbnails only (QR moved to painting top-right) -->
    <div id="bottomBar">
      <div id="thumbsStrip"></div>
    </div>

  </div><!-- /stage -->

  <!-- ══ PAINTING (RIGHT) — figure faces LEFT = faces the slideshow ══ -->
  <div id="masterWrap">
    <img id="masterImg" src="../assets/suphu.jpg" alt="Sư phụ Duy Linh">
    <!-- QR top-right of painting panel -->
    <div id="qrOnPainting">
      <div id="qrBar"></div>
      <div class="qr-hint">Quét để chia sẻ ảnh</div>
    </div>
  </div>

</div><!-- /app -->

<!-- QR code lib -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
import { getFirestore, collection, query, orderBy, limit, onSnapshot }
  from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:            "AIzaSyCk8mVmsq8HuGRDF6jJZMTCNPHb6VziS1c",
  authDomain:        "duylinh-birthday.firebaseapp.com",
  projectId:         "duylinh-birthday",
  storageBucket:     "duylinh-birthday.firebasestorage.app",
  messagingSenderId: "574748198046",
  appId:             "1:574748198046:web:7934050b4707848f4f678f",
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── QR codes ──
const guestUrl = window.location.origin;

new QRCode(document.getElementById('qrEmpty'), {
  text: guestUrl, width: 156, height: 156,
  colorDark: '#0e3d50', colorLight: '#f5f5f5',
  correctLevel: QRCode.CorrectLevel.M,
});

new QRCode(document.getElementById('qrBar'), {
  text: guestUrl, width: 70, height: 70,
  colorDark: '#0e3d50', colorLight: '#f5f5f5',
  correctLevel: QRCode.CorrectLevel.M,
});

document.getElementById('emptyUrl').textContent = guestUrl.replace('https://', '');

// ── Slideshow state ──
const NEW_SLIDE_MS = 15000;
const OLD_SLIDE_MS =  4000;
let allPhotos        = [];
let currentIdx       = 0;
let slideTimer       = null;
let prevNewestId     = null;
let renderedThumbIds = [];
let loadGen          = 0;        // generation counter — prevents stale image loads
let confettiRaf      = null;     // module-scoped so we can cancel on unload
let lastConfettiAt   = 0;        // debounce rapid new-photo events

// ── Elements ──
const elEmpty   = document.getElementById('empty');
const elDisplay = document.getElementById('photoDisplay');
const elPhoto   = document.getElementById('mainPhoto');
const elInfo    = document.getElementById('mainInfo');
const elName    = document.getElementById('infoName');
const elComment = document.getElementById('infoComment');
const elCounter = document.getElementById('slideCounter');
const elBar     = document.getElementById('progressBar');
const elThumbs  = document.getElementById('thumbsStrip');
const elCount   = document.getElementById('photoCount');

// ── Firestore listener (unsubscribe stored for cleanup) ──
const q = query(collection(db, 'photos'), orderBy('timestamp', 'desc'), limit(50));
const unsubscribeFirestore = onSnapshot(q, snap => {
  const fresh = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(p => p.imageUrl);
  elCount.textContent = fresh.length + ' ảnh';
  if (!fresh.length) { showEmpty(); return; }

  const newestId = fresh[0].id;
  allPhotos = fresh;

  if (newestId !== prevNewestId) {
    prevNewestId = newestId;
    goToIndex(0, true);
    spawnConfetti();
  }

  renderThumbs();
}, err => {
  console.error('[Firestore] Listener error:', err.code, err.message);
});

// ── Cleanup on unload ──
window.addEventListener('pagehide', () => {
  unsubscribeFirestore();
  clearTimeout(slideTimer);
  if (confettiRaf) cancelAnimationFrame(confettiRaf);
});

// ── Show / hide states ──
function showEmpty() {
  elEmpty.classList.remove('hidden');
  elDisplay.classList.remove('visible');
  clearTimeout(slideTimer);
}
function showDisplay() {
  elEmpty.classList.add('hidden');
  elDisplay.classList.add('visible');
}

// ── Navigate to photo ──
function goToIndex(idx, isNew = false) {
  if (!allPhotos.length) { showEmpty(); return; }   // guard: empty array → NaN modulo crash
  currentIdx = ((idx % allPhotos.length) + allPhotos.length) % allPhotos.length;
  const photo = allPhotos[currentIdx];
  if (!photo) return;
  const duration = isNew ? NEW_SLIDE_MS : OLD_SLIDE_MS;

  showDisplay();
  elPhoto.classList.add('fade');
  elInfo.classList.remove('show');

  const gen = ++loadGen;   // generation stamp — discard stale loads

  setTimeout(() => {
    elPhoto.src           = photo.imageUrl;
    elName.textContent    = photo.name    || '';
    elComment.textContent = photo.comment ? `"${photo.comment}"` : '';
    elCounter.textContent = `${currentIdx + 1} / ${allPhotos.length}`;

    const reveal = () => {
      if (gen !== loadGen) return;   // another load started — discard this one
      elPhoto.classList.remove('fade');
      setTimeout(() => elInfo.classList.add('show'), 200);
    };
    elPhoto.onload = reveal;
    if (elPhoto.complete && elPhoto.naturalWidth) reveal();
    // Fallback: force reveal after 3s in case onload never fires (e.g. opaque cache)
    setTimeout(reveal, 3000);
  }, 500);

  startProgress(duration);
  scheduleNext(duration);
  renderThumbs();
}

// ── Auto-advance (random order) ──
function scheduleNext(duration) {
  clearTimeout(slideTimer);
  if (allPhotos.length <= 1) return;
  slideTimer = setTimeout(() => {
    let next;
    if (allPhotos.length === 2) {
      next = 1 - currentIdx;
    } else {
      do { next = Math.floor(Math.random() * allPhotos.length); }
      while (next === currentIdx);
    }
    goToIndex(next);
  }, duration);
}

// ── Progress bar (single RAF + forced reflow) ──
function startProgress(duration) {
  elBar.style.transition = 'none';
  elBar.style.width = '0%';
  requestAnimationFrame(() => {
    elBar.offsetWidth;   // force reflow so transition reset is applied
    elBar.style.transition = `width ${duration}ms linear`;
    elBar.style.width = '100%';
  });
}

// ── Thumbnails — horizontal strip, diff-based render ──
function renderThumbs() {
  const others = allPhotos.filter((_, i) => i !== currentIdx);
  const newIds = others.map(p => p.id);
  const prevSet  = new Set(renderedThumbIds);
  const addedIds = new Set(newIds.filter(id => !prevSet.has(id)));

  const sameOrder = newIds.length === renderedThumbIds.length &&
                    newIds.every((id, i) => id === renderedThumbIds[i]);

  if (!sameOrder) {
    elThumbs.innerHTML = '';
    others.forEach(p => {
      const origIdx = allPhotos.indexOf(p);
      const div = document.createElement('div');
      div.className = 'thumb' + (addedIds.has(p.id) ? ' thumb-new' : '');
      div.innerHTML = `<img src="${p.imageUrl}" loading="lazy" alt="">`;
      div.addEventListener('click', () => goToIndex(origIdx));
      elThumbs.appendChild(div);
    });
    renderedThumbIds = newIds;
  }

  elThumbs.querySelectorAll('.thumb').forEach((el, i) => {
    el.classList.toggle('active-thumb', others[i]?.id === allPhotos[currentIdx]?.id);
  });
}

// ── Confetti (debounced + module-scoped RAF so it can be cancelled on unload) ──
function spawnConfetti() {
  const now = Date.now();
  if (now - lastConfettiAt < 800) return;   // debounce: skip if < 800ms since last
  lastConfettiAt = now;

  if (confettiRaf) cancelAnimationFrame(confettiRaf);

  const canvas = document.getElementById('confetti');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx  = canvas.getContext('2d');
  const colors = ['#ffd700','#c8952a','#fff','#c0392b','#4ecdc4','#f0e8d8'];
  const parts = Array.from({ length: 72 }, () => ({
    x: Math.random() * canvas.width,
    y: -10,
    r: Math.random() * 5 + 2,
    color: colors[Math.floor(Math.random() * colors.length)],
    vx: (Math.random() - 0.5) * 4.5,
    vy: Math.random() * 3.5 + 1.5,
    alpha: 1,
    rot: Math.random() * 360,
    drot: (Math.random() - 0.5) * 8,
  }));
  function step() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    parts.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.07;
      p.rot += p.drot; p.alpha -= 0.011;
      if (p.alpha <= 0) return; alive = true;
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 1.6);
      ctx.restore();
    });
    if (alive) confettiRaf = requestAnimationFrame(step);
    else { ctx.clearRect(0, 0, canvas.width, canvas.height); confettiRaf = null; }
  }
  step();
}
</script>

<!-- Fullscreen logic -->
<script>
(function () {
  const btn = document.getElementById('fsBtn');

  function toggleFS() {
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      const el = document.documentElement;
      (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    }
  }

  btn.addEventListener('click', toggleFS);

  // F11 shortcut (browsers may intercept, but try)
  document.addEventListener('keydown', e => {
    if (e.key === 'F11') { e.preventDefault(); toggleFS(); }
  });

  // Auto-enter fullscreen on first user interaction (optional, commented out)
  // document.addEventListener('click', toggleFS, { once: true });
})();
</script>

<!-- Giấy dó paper texture (cached in sessionStorage — generated only once per session) -->
<script>
(function () {
  const CACHE_KEY = 'giay_do_v2';
  const S = 600;

  let dataUrl = null;
  try { dataUrl = sessionStorage.getItem(CACHE_KEY); } catch(e) {}

  if (!dataUrl) {
    const c = document.createElement('canvas');
    c.width = c.height = S;
    const g = c.getContext('2d');
    for (let i = 0; i < 700; i++) {
      const x  = Math.random() * S;
      const y  = Math.random() * S;
      const l  = 20 + Math.random() * 130;
      const a  = Math.random() * Math.PI * 2;
      const light = Math.random() > 0.32;
      const alpha = light ? (0.014 + Math.random() * 0.028) : (0.008 + Math.random() * 0.016);
      const color = light ? '255,255,255' : '0,40,50';
      const cx = x + Math.cos(a) * l * 0.45 + (Math.random() - 0.5) * 10;
      const cy = y + Math.sin(a) * l * 0.45 + (Math.random() - 0.5) * 14;
      g.beginPath(); g.moveTo(x, y);
      g.quadraticCurveTo(cx, cy, x + Math.cos(a) * l, y + Math.sin(a) * l);
      g.strokeStyle = `rgba(${color},${alpha.toFixed(3)})`;
      g.lineWidth = 0.22 + Math.random() * 0.7;
      g.stroke();
    }
    dataUrl = c.toDataURL();
    try { sessionStorage.setItem(CACHE_KEY, dataUrl); } catch(e) {}
  }

  const el = document.createElement('div');
  el.style.cssText = [
    'position:fixed', 'inset:0', 'pointer-events:none', 'z-index:0',
    `background:url(${dataUrl}) repeat`,
    `background-size:${S}px ${S}px`
  ].join(';');
  document.body.insertBefore(el, document.getElementById('app'));
})();
</script>
