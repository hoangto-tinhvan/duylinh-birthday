<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎂 Sinh nhật sư phụ Duy Linh 3⁴</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(-45deg, #c2185b, #7b1fa2, #e53935, #ad1457, #6a1b9a);
      background-size: 400% 400%;
      animation: bgFlow 14s ease infinite;
    }
    @keyframes bgFlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ── Floating hearts ── */
    .fheart {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      animation: floatUp linear infinite;
      opacity: 0;
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg) scale(1);   opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.5; }
      100% { transform: translateY(-12vh) rotate(720deg) scale(0.5); opacity: 0; }
    }

    /* ── Layout ── */
    #app {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
    }

    /* ══ LEFT PANEL ══ */
    #panel {
      flex-shrink: 0;
      width: 313px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 20px;
      gap: 0;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(24px);
      border-right: 1px solid rgba(255,255,255,0.25);
      box-shadow: 4px 0 40px rgba(0,0,0,0.25);
      overflow: hidden;
    }

    .panel-cake { font-size: 44px; margin-bottom: 6px; animation: bounce 2s ease-in-out infinite; }
    @keyframes bounce { 0%,100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-8px) rotate(5deg); } }

    .panel-title {
      font-family: 'Dancing Script', cursive;
      font-size: 1.35rem;
      color: #fff;
      text-align: center;
      line-height: 1.4;
      text-shadow: 0 2px 12px rgba(0,0,0,0.4);
      margin-bottom: 4px;
    }
    .panel-title .name {
      font-size: 1.6rem;
      color: #ffd700;
      display: block;
      text-shadow: 0 0 20px rgba(255,215,0,0.6), 0 2px 8px rgba(0,0,0,0.5);
    }
    .panel-title sup { font-size: 0.75em; }

    .panel-divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 12px 0;
    }
    .panel-divider::before, .panel-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,215,0,0.5);
    }
    .panel-divider span { color: #ffd700; font-size: 14px; }

    /* QR */
    #qrWrap {
      background: rgba(255,255,255,0.9);
      border-radius: 14px;
      padding: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3), 0 0 0 2px rgba(255,215,0,0.5);
      margin-bottom: 8px;
    }
    #qrCanvas { display: block; border-radius: 6px; }
    .qr-label {
      text-align: center;
      font-size: 0.68rem;
      color: rgba(255,255,255,0.8);
      margin-bottom: 4px;
      letter-spacing: 0.3px;
    }
    .qr-url {
      text-align: center;
      font-size: 0.7rem;
      color: #ffd700;
      font-weight: 500;
      margin-bottom: 12px;
    }

    /* Live + count */
    .live-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.85);
      margin-bottom: 12px;
    }
    .live-dot {
      width: 7px; height: 7px;
      background: #4ade80;
      border-radius: 50%;
      box-shadow: 0 0 8px #4ade80;
      animation: blink 1.6s ease-in-out infinite;
    }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    /* Thumbnails grid */
    #thumbs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      width: 100%;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      align-content: start;
    }
    #thumbs::-webkit-scrollbar { width: 4px; }
    #thumbs::-webkit-scrollbar-track { background: transparent; }
    #thumbs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    .thumb {
      aspect-ratio: 1;
      border-radius: 5px;
      overflow: hidden;
      border: 1.5px solid rgba(255,215,0,0.35);
      cursor: pointer;
      transition: transform 0.18s, border-color 0.18s;
      position: relative;
    }
    .thumb.thumb-new { animation: thumbPop 0.3s ease; }
    @keyframes thumbPop { from { transform: scale(0.7); opacity:0; } to { transform: scale(1); opacity:1; } }
    .thumb:hover { transform: scale(1.08); border-color: #ffd700; }
    .thumb.active-thumb { border-color: #ffd700; box-shadow: 0 0 8px rgba(255,215,0,0.6); }
    .thumb img { width:100%; height:100%; object-fit:cover; display:block; }

    /* ══ MAIN AREA ══ */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 28px;
      position: relative;
      overflow: hidden;
    }

    /* Empty state */
    #empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 12px;
      transition: opacity 0.5s;
    }
    #empty.hidden { opacity:0; pointer-events:none; position:absolute; }

    .empty-emoji { font-size: 56px; animation: bounce 2s ease-in-out infinite; }
    .empty-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: #fff;
      text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    .empty-sub { color: rgba(255,255,255,0.75); font-size: 0.95rem; }

    #qrEmpty {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,215,0,0.4);
      border-radius: 20px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(10px);
    }
    .empty-qr-label { font-size: 0.8rem; color: rgba(255,255,255,0.8); }
    .empty-qr-url   { font-size: 0.9rem; color: #ffd700; font-weight: 500; }

    /* Photo display */
    #photoDisplay {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      height: 100%;
      gap: 12px;
    }
    #photoDisplay.visible { display: flex; }

    /* Photo frame */
    #photoFrame {
      position: relative;
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    #mainPhoto {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      display: block;
      border-radius: 18px;
      border: 4px solid rgba(255,255,255,0.9);
      box-shadow:
        0 0 0 2px rgba(255,215,0,0.6),
        0 24px 80px rgba(0,0,0,0.5),
        0 0 60px rgba(233,30,140,0.25);
      transition: opacity 0.5s ease;
      object-fit: contain;
    }
    #mainPhoto.fade { opacity: 0; }

    /* Info overlay */
    #mainInfo {
      position: absolute;
      bottom: 4px; left: 0; right: 0;
      padding: 32px 24px 16px;
      background: linear-gradient(transparent, rgba(0,0,0,0.72));
      border-radius: 0 0 14px 14px;
      transform: translateY(8px);
      opacity: 0;
      transition: opacity 0.5s 0.3s, transform 0.5s 0.3s;
      pointer-events: none;
    }
    #mainInfo.show { opacity:1; transform:translateY(0); }

    #infoName {
      font-family: 'Dancing Script', cursive;
      font-size: 2rem;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
      margin-bottom: 2px;
    }
    #infoComment {
      font-size: 1rem;
      color: rgba(255,255,255,0.88);
      font-style: italic;
      font-weight: 300;
      text-shadow: 0 1px 6px rgba(0,0,0,0.8);
    }

    /* Slide counter */
    #slideCounter {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.5);
      position: absolute;
      top: 10px; right: 14px;
      background: rgba(0,0,0,0.3);
      border-radius: 100px;
      padding: 3px 10px;
    }

    /* Progress bar */
    #progressWrap {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 100px;
      overflow: hidden;
      flex-shrink: 0;
    }
    #progressBar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ffd700, #ff80ab, #ffd700);
      background-size: 200% 100%;
      border-radius: 100px;
      animation: shimmer 2s linear infinite;
    }
    @keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }

    /* Confetti canvas */
    #confetti { position:fixed; inset:0; pointer-events:none; z-index:50; }
  </style>
</head>
<body>

<canvas id="confetti"></canvas>

<div id="app">
  <!-- ══ LEFT PANEL ══ -->
  <aside id="panel">
    <div class="panel-cake">🎂</div>
    <div class="panel-title">
      Sinh nhật sư phụ<br>
      <span class="name">Duy Linh 3<sup>4</sup></span>
    </div>

    <div class="panel-divider"><span>♥ ♥ ♥</span></div>

    <p class="qr-label">Quét để chia sẻ ảnh lên màn hình</p>
    <div id="qrWrap"><canvas id="qrCanvas"></canvas></div>
    <div class="qr-url" id="qrUrl"></div>

    <div class="live-row">
      <div class="live-dot"></div>
      <span>LIVE &nbsp;·&nbsp; <span id="photoCount">0 ảnh</span></span>
    </div>

    <div id="thumbs"></div>
  </aside>

  <!-- ══ MAIN AREA ══ -->
  <main id="main">

    <!-- Empty state -->
    <div id="empty">
      <div class="empty-emoji">✨</div>
      <h2 class="empty-title">Đêm tiệc sắp bắt đầu!</h2>
      <p class="empty-sub">Khách mời quét mã QR để chia sẻ khoảnh khắc</p>
      <div id="qrEmpty">
        <canvas id="qrEmptyCanvas"></canvas>
        <div class="empty-qr-label">Quét để chia sẻ ảnh lên màn hình</div>
        <div class="empty-qr-url" id="emptyUrl"></div>
      </div>
    </div>

    <!-- Photo display -->
    <div id="photoDisplay">
      <div id="photoFrame">
        <img id="mainPhoto" src="" alt="">
        <div id="mainInfo">
          <div id="infoName"></div>
          <div id="infoComment"></div>
        </div>
        <div id="slideCounter"></div>
      </div>
      <div id="progressWrap"><div id="progressBar"></div></div>
    </div>

  </main>
</div>

<!-- QR code lib -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
import { getFirestore, collection, query, orderBy, limit, onSnapshot }
  from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:            "AIzaSyCk8mVmsq8HuGRDF6jJZMTCNPHb6VziS1c",
  authDomain:        "duylinh-birthday.firebaseapp.com",
  projectId:         "duylinh-birthday",
  storageBucket:     "duylinh-birthday.firebasestorage.app",
  messagingSenderId: "574748198046",
  appId:             "1:574748198046:web:7934050b4707848f4f678f",
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── QR Codes ──
const guestUrl = window.location.origin;

function makeQR(el, size) {
  el.innerHTML = '';
  new QRCode(el, {
    text: guestUrl, width: size, height: size,
    colorDark: '#7b1fa2', colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M,
  });
  // Fix: QRCode lib creates an img inside div; move canvas out if needed
}
makeQR(document.getElementById('qrWrap').querySelector('#qrCanvas').parentElement || document.getElementById('qrWrap'), 120);
// Actually create fresh QRCode in the wrapper divs
document.getElementById('qrWrap').innerHTML = '';
new QRCode(document.getElementById('qrWrap'), { text: guestUrl, width: 120, height: 120, colorDark: '#7b1fa2', colorLight: '#f8f8f8', correctLevel: QRCode.CorrectLevel.M });

document.getElementById('qrEmpty').innerHTML = '';
new QRCode(document.getElementById('qrEmpty'), { text: guestUrl, width: 180, height: 180, colorDark: '#7b1fa2', colorLight: '#f8f8f8', correctLevel: QRCode.CorrectLevel.M });
// Re-add labels after QRCode clears innerHTML
document.getElementById('qrEmpty').insertAdjacentHTML('beforeend',
  `<div class="empty-qr-label">Quét để chia sẻ ảnh lên màn hình</div>
   <div class="empty-qr-url" id="emptyUrl"></div>`);

document.getElementById('qrUrl').textContent     = guestUrl.replace('https://','');
document.getElementById('emptyUrl').textContent   = guestUrl.replace('https://','');

// ── Slideshow state ──
const NEW_SLIDE_MS = 15000;   // ảnh mới: 15 giây
const OLD_SLIDE_MS =  4000;   // ảnh cũ: 4 giây
let allPhotos    = [];
let currentIdx   = 0;
let slideTimer   = null;
let prevNewestId = null;

// ── Elements ──
const elEmpty   = document.getElementById('empty');
const elDisplay = document.getElementById('photoDisplay');
const elPhoto   = document.getElementById('mainPhoto');
const elInfo    = document.getElementById('mainInfo');
const elName    = document.getElementById('infoName');
const elComment = document.getElementById('infoComment');
const elCounter = document.getElementById('slideCounter');
const elBar     = document.getElementById('progressBar');
const elThumbs  = document.getElementById('thumbs');
const elCount   = document.getElementById('photoCount');

// ── Firestore listener ──
const q = query(collection(db, 'photos'), orderBy('timestamp', 'desc'), limit(30));
onSnapshot(q, snap => {
  const fresh = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(p => p.imageUrl);
  elCount.textContent = fresh.length + ' ảnh';

  if (!fresh.length) { showEmpty(); return; }

  const newestId = fresh[0].id;
  allPhotos = fresh;

  if (newestId !== prevNewestId) {
    prevNewestId = newestId;
    goToIndex(0, true);    // Jump to newest (show 15s)
    spawnConfetti();
  }

  renderThumbs();
});

// ── Show / hide states ──
function showEmpty() {
  elEmpty.classList.remove('hidden');
  elDisplay.classList.remove('visible');
  clearTimeout(slideTimer);
}

function showDisplay() {
  elEmpty.classList.add('hidden');
  elDisplay.classList.add('visible');
}

// ── Go to photo at index ──
function goToIndex(idx, isNew = false) {
  currentIdx = ((idx % allPhotos.length) + allPhotos.length) % allPhotos.length;
  const photo = allPhotos[currentIdx];
  if (!photo) return;
  const duration = isNew ? NEW_SLIDE_MS : OLD_SLIDE_MS;

  showDisplay();

  // Fade out → swap → fade in
  elPhoto.classList.add('fade');
  elInfo.classList.remove('show');

  setTimeout(() => {
    elPhoto.src       = photo.imageUrl;
    elName.textContent    = photo.name || '';
    elComment.textContent = photo.comment ? `"${photo.comment}"` : '';
    elCounter.textContent = `${currentIdx + 1} / ${allPhotos.length}`;
    elPhoto.onload = () => {
      elPhoto.classList.remove('fade');
      setTimeout(() => elInfo.classList.add('show'), 200);
    };
    // If already cached (no onload fires), just show
    if (elPhoto.complete && elPhoto.naturalWidth) {
      elPhoto.classList.remove('fade');
      setTimeout(() => elInfo.classList.add('show'), 200);
    }
  }, 500);

  startProgress(duration);
  scheduleNext(duration);
  renderThumbs();
}

// ── Auto-advance (random, not sequential) ──
function scheduleNext(duration) {
  clearTimeout(slideTimer);
  if (allPhotos.length <= 1) return;
  slideTimer = setTimeout(() => {
    let nextIdx;
    if (allPhotos.length === 2) {
      nextIdx = 1 - currentIdx;
    } else {
      do { nextIdx = Math.floor(Math.random() * allPhotos.length); }
      while (nextIdx === currentIdx);
    }
    goToIndex(nextIdx);
  }, duration);
}

// ── Progress bar ──
function startProgress(duration) {
  elBar.style.transition = 'none';
  elBar.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    elBar.style.transition = `width ${duration}ms linear`;
    elBar.style.width = '100%';
  }));
}

// ── Thumbnails ──
let renderedThumbIds = [];   // track which IDs are currently in the grid

function renderThumbs() {
  // Build list: all photos newest-first, skip the currently displayed one
  const others = allPhotos.filter((_, i) => i !== currentIdx);
  const newIds  = others.map(p => p.id);

  // Find IDs that are brand-new (not in the previous render)
  const prevSet = new Set(renderedThumbIds);
  const addedIds = new Set(newIds.filter(id => !prevSet.has(id)));

  // Full rebuild only when the list changed; otherwise just update active border
  const sameOrder = newIds.length === renderedThumbIds.length &&
                    newIds.every((id, i) => id === renderedThumbIds[i]);
  if (!sameOrder) {
    elThumbs.innerHTML = '';
    others.forEach(p => {
      const origIdx = allPhotos.indexOf(p);
      const div = document.createElement('div');
      // Only animate genuinely new entries
      div.className = 'thumb' + (addedIds.has(p.id) ? ' thumb-new' : '');
      div.innerHTML = `<img src="${p.imageUrl}" loading="lazy" alt="">`;
      div.addEventListener('click', () => goToIndex(origIdx));
      elThumbs.appendChild(div);
    });
    renderedThumbIds = newIds;
  }

  // Update active highlight without re-rendering
  elThumbs.querySelectorAll('.thumb').forEach((el, i) => {
    el.classList.toggle('active-thumb', others[i]?.id === allPhotos[currentIdx]?.id);
  });
}

// ── Confetti ──
function spawnConfetti() {
  const canvas = document.getElementById('confetti');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#ffd700','#ff80ab','#fff','#ff4d9d','#c44dff','#f9a825'];
  const particles = Array.from({ length: 80 }, () => ({
    x: Math.random() * canvas.width,
    y: -10,
    r: Math.random() * 6 + 3,
    color: colors[Math.floor(Math.random() * colors.length)],
    vx: (Math.random() - 0.5) * 5,
    vy: Math.random() * 4 + 2,
    alpha: 1,
    rot: Math.random() * 360,
    drot: (Math.random() - 0.5) * 10,
  }));
  let raf;
  function step() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.1;
      p.rot += p.drot; p.alpha -= 0.011;
      if (p.alpha <= 0) return; alive = true;
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 1.6);
      ctx.restore();
    });
    if (alive) raf = requestAnimationFrame(step);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  cancelAnimationFrame(raf);
  step();
}

function esc(s) {
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>

<!-- Floating hearts -->
<script>
(function() {
  const hearts = ['❤️','🩷','💕','💖','💗','💓','🌸','✨','💫','🎀'];
  for (let i = 0; i < 22; i++) {
    const el = document.createElement('div');
    el.className = 'fheart';
    el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
    const size = Math.random() * 22 + 12;
    const dur  = Math.random() * 12 + 8;
    const delay = Math.random() * 10;
    el.style.cssText = `
      left: ${Math.random() * 100}vw;
      font-size: ${size}px;
      animation-duration: ${dur}s;
      animation-delay: ${delay}s;
    `;
    document.body.appendChild(el);
  }
})();
</script>

</body>
</html>
